<!DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	<meta content="noindex">
	<title>404 Not Found</title>

	<link rel="shortcut icon" href="favicon.ico">
	<link rel="stylesheet" href="../css/style.css">
	<link rel="stylesheet" href="../css/animate.css">

	<script src="../js/jquery.js"></script>
	<script src="../js/disabler.js"></script>
	<script src="../js/utils.js"></script>
	<script>
		window.onload = () => {
			document.getElementById("message").innerText = location.pathname.toLowerCase() + " が見つかりませんでした・・・。";
		}
	</script>
</head>

<body style="padding-top: 3%; line-height: 95%;">
	<ul class="info">
		[error]
		<li>
			404 not found
		</li>
		<li id="message">
		</li>
		<li>
			<br/>
			<a href="../"><= back to index</a>
		</li>
	</ul>

	<img src="../bg.jpg" class="background">
</body>
</html>
