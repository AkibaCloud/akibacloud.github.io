	<script src="../js/yeet/jquery.js"></script>

	<script src="../js/yeet/main.js"></script>
	<script src="../js/yeet/disabler.js"></script>

	<script>
		var issuesUrl = "https://api.github.com/repos/AkibaCloud/db/issues";
		function getJson(url, cb) {
			var r = new XMLHttpRequest();
			r.open("GET", url, true);
			r.onreadystatechange = function () {
				if(r.readyState !== 4) return;
				var json = JSON.parse(r.responseText);
				cb(r.status, json);
			};
			r.send();
		};
		function fixUrl(url) {
			if(!/^https?:\/\//.test(url)) {
				return 'http://' + url;
			}
			return url;
		};

		function explain() {
			document.body.className = "explain";
			getJson(issuesUrl, function(status, json) {
				nextN = json[0].number + 1;
				var ul = document.getElementById('existing');
				var i;
				for(i = 0; i < json.length; i++) {
					var number = json[i].number, url = fixUrl(json[i].title), short = "akiba.cloud/?s=" + number, 
						date = json[i].created_at, li = document.createElement('li'),
						a = document.createElement('a');
					a.href = "https://" + short;
					a.target = "_blank";
					a.textContent = " - [" + date + "] " + short + " -> " + url;

					li.appendChild(a);
					ul.appendChild(li);
				}
			})
		};

		function redirect(n) {
			document.body.className = "redirect";
			getJson(issuesUrl + '/' + n, function(status, json) {
				if(status === 200) {
					var url = fixUrl(json.title);
					window.location.replace(url);
				} else {
					document.body.className = "error";
					console.log(json.message);
					document.getElementById('error-message').innerHTML = json.message;
				}
			})
		};

		var getN = function() {
			return parseInt(window.location.search.substring(1), 10);
		};

		function main() {
			var n = getN();
			if (n) {
				redirect(n);
			} else {
				explain();
			}
		};

		setTimeout(main, 1);
	</script>
</head>
