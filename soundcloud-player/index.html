<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <title>SoundCloud Player</title>
  <link rel='stylesheet' type='text/css' href='https://fonts.googleapis.com/css?family=Inconsolata'>
  <link rel='stylesheet' type='text/css' href='../assets/main/style.css'>
  <style type='text/css'>
    a {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1># SoundCloud-Player</h1>
  <span>
    Install On <a>Chrome (Edge, Opera, Brave)</a> / <a>Firefox</a>
    <br><br>
    Links [ <a>Wiki Page</a> / <a>Donate</a> / <a>Google Form</a> ]
  </span>

  <br><br>

  <iframe width="640" height="400" src="https://www.youtube.com/embed/hIJyF2u3-RY" title="Quick Tutorial for SoundCloud Player 1.3.0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

  <br><br>

  <span>
    Made in Japan.
  <br><br>
    [ <a>Top</a> > SoundCloud-Player ]
  </span>

  <script type="text/javascript">
    let w = document.querySelectorAll('a'), z = [
      'https://chrome.google.com/webstore/detail/soundcloud-player/oackhlcggjandamnkggpfhfjbnecefej',
      'https://addons.mozilla.org/en-US/firefox/addon/soundcloud-player/',
      'https://github.com/S4WA/SoundCloud-Player/wiki',
      'https://ko-fi.com/sawanese',
      'https://forms.gle/EUhfFyrUan3CdVn26',
      '../'
    ];
    for (var i = 0; i < w.length; i++) {
      if (i != w.length - 1) w[i].setAttribute('target', '_blank');
      w[i].setAttribute('href', z[i]);
    }
  </script>
</body>
</html>
