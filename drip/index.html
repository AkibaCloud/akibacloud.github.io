	<script type="text/javascript">
		function switchVideo() {
			var items = ["https://www.dropbox.com/s/6dxwvqbzpz42kht/rakisuta.mp4?dl=1", "https://www.dropbox.com/s/xyy0xu4hgazsugz/rakisuta-2.mp4?dl=1", "https://www.dropbox.com/s/esjmu9wwlw8vaz5/dancing-2.mp4?dl=1", "https://www.dropbox.com/s/4d8vjhlq1shngqq/dancing.mp4?dl=1", "https://www.dropbox.com/s/sqrqithy4cdhkxw/dancing-3.mp4?dl=1"],
				video, videoid = getArg("id");
			if (videoid !== null && videoid <= items.length) {
				video = items[ videoid ];
			} else {
				video = items[ Math.floor(Math.random() * (items.length)) ]
			}
			document.getElementById("site-info").innerText = document.getElementById("site-info").innerText.replace("%replace%", items.length-1);
			document.getElementById("video-src").src = video;

			if (videoid >= items.length) console.log(videoid + " is not exist!");
			console.log("video: " + video);
		};
	</script>

	<script type="text/javascript">
		document.addEventListener("DOMContentLoaded", function() {
			switchVideo();

			if (localStorage.getItem("Volume") !== null && localStorage.getItem("Volume") !== "null") {
				var vol = parseFloat(localStorage.getItem("Volume"));
				document.getElementById("input").value = vol;
				changeVolume(vol);
				SetVolume(vol);
			} else {
				SetVolume(10);
				localStorage.setItem("Volume", 10);
				document.getElementById("input").value = 10;
				document.getElementById("volume").innerText = "volume: 10%";
			}
		});
	</script>

	<script type="text/javascript">
		function changeVolume(value) {
			SetVolume(value);
			document.getElementById("volume").innerText = "volume: " + value + '%';
			localStorage.setItem("Volume", document.getElementById("volume").innerText.replace("volume: ", "").replace("%", ""));
		};
	</script>

	<script type="text/javascript">
		function toggle() {
			var btn = document.getElementById("toggle");
			// console.log(btn.innerText);
			if (btn.innerText === "play") {
				video.play();
				btn.innerText = "pause";
			} else {
				video.pause();
				btn.innerText = "play";
			}
		};
	</script>

	<script type="text/javascript">
		window.onload = function(){
			var vid = document.getElementById("video");
			vid.addEventListener("playing", function(){
				console.log("video: playing");
			}, false);

			vid.addEventListener("pause", function(){
				console.log("video: paused");
			}, false);

			vid.addEventListener("loadedmetadata", function(){
				console.log("video: loaded!");
			}, false);

			vid.addEventListener("canplaythrough", function(){
				console.log("video: suro-!");

				/*var btn = document.getElementById("toggle");
				if (btn.innerText === "play") {
					btn.innerText = "pause";
				} else {
					btn.innerText = "play";
				}*/

				//toggle();
			}, false);
		};
	</script>

	<script>
		function getArg(name, url) {
			if (!url) url = window.location.href;
			name = name.replace(/[\[\]]/g, "\\$&");
			var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
				results = regex.exec(url);
			if (!results) return null;
			if (!results[2]) return '';
			return decodeURIComponent(results[2].replace(/\+/g, " "));
		}
	</script>

	<script type="text/javascript">
		function popup(url, title, w, h) {
			window.open(url, title, "width = w, height = h");
		}
	</script>
