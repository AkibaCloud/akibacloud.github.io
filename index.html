	<script type="text/javascript">
		var space = " ";
		var speed = "200";
		var pos = 0;
		var msg = "crystal by drip  -    ";
		function Scroll()
		{
		document.title = msg.substring(pos, msg.length) + space + msg.substring(0,pos);
		pos++;
		if (pos > msg.length) pos = 0;
		window.setTimeout("Scroll()", speed);
		}
		Scroll();
	</script>

	<script type="text/javascript">
		window.onload = getLatestBuild(), getJson();

		function getLatestBuild() {
		  var xmlhttp = createXMLHttpRequest(); //IEにも対応する時

		  xmlhttp.onreadystatechange = function () {
			 if (xmlhttp.readyState == 4) {
				if (xmlhttp.status == 200) {
				  var data = JSON.parse(xmlhttp.responseText);

				  var elem = document.getElementById("latest_build");
				  elem.innerText = "Latest Build: " + data.latestbuild;
				  var elem = document.getElementById("edition");
				  elem.innerText = "Edition: " + data.edition;
				  console.log(document.getElementById("latest_build").innerText + ", " + document.getElementById("edition").innerText);
				} else {
				}
			 }
		  }
		  xmlhttp.open("GET", "https://akiba.cloud/crystal/info.json");
		  xmlhttp.send();
		}

		function getJson() {
		  var xmlhttp = createXMLHttpRequest();

		  xmlhttp.onreadystatechange = function () {
			 if (xmlhttp.readyState == 4) {
				if (xmlhttp.status == 200) {
				  var data = JSON.parse(xmlhttp.responseText);
				  var latestBuild = document.getElementById("latest_build").innerText.replace("Latest Build: ", "");

				  var elem = document.getElementById("add");
				  elem.innerText = data[latestBuild].add;
				  var elem = document.getElementById("fix");
				  elem.innerText = data[latestBuild].fix;
				  var elem = document.getElementById("del");
				  elem.innerText = data[latestBuild].del;

				  console.log("==================== INFO ===================="); <!-- イコール20個 -->
				  console.log(document.getElementById("add").innerText);
				  console.log(document.getElementById("fix").innerText);
				  console.log(document.getElementById("del").innerText);
				} else {
				}
			 }
		  }
		  xmlhttp.open("GET", "https://akiba.cloud/crystal/changelog.json");
		  xmlhttp.send();
		}

		function createXMLHttpRequest() {
		  if (window.XMLHttpRequest) { return new XMLHttpRequest() }
		  if (window.ActiveXObject) {
			 try { return new ActiveXObject("Msxml2.XMLHTTP.6.0") } catch (e) { }
			 try { return new ActiveXObject("Msxml2.XMLHTTP.3.0") } catch (e) { }
			 try { return new ActiveXObject("Microsoft.XMLHTTP") } catch (e) { }
		  }
		  return false;
		}
	</script>

			.clockStyle {

			}

		<center>
			<div id="clockDisplay" class="clockStyle">
			</div>
		</center>

		<script>
			function renderTime() {
			var currentTime = new Date();
			var diem = "am";
			var h = currentTime.getHours();
			var m = currentTime.getMinutes();
			var s = currentTime.getSeconds();
			setTimeout('renderTime()',1000);
			if (h == 0) {
				h = 12;
			} else if (h > 12) {
				h = h - 12;
				diem="pm";
			}
			if (h < 10) {
				h = "0" + h;
			}
			if (m < 10) {
				m = "0" + m;
			}
			if (s < 10) {
				s = "0" + s;
			}
			var myClock = document.getElementById('clockDisplay');
			myClock.textContent = h + ":" + m + ":" + s + " " + diem;
			myClock.innerText = h + ":" + m + ":" + s + " " + diem;
			}
			renderTime();
		</script>
