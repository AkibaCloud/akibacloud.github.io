<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>akiba.cloud</title>
  <link rel='stylesheet' type='text/css' href='assets/main/style.css'>
  <script src='assets/js/three.js'></script>
</head>
<body>
  <div id='cube'></div>
  <div id='list'>
    <ul>
      <span>Contact<br>NONE</span>
    </ul>
    <ul>
      <span>Donate</span>
      <li>
        <a href="https://ko-fi.com/sawanese" target="_blank">Ko-Fi</a>
      </li>
    </ul>
    <ul>
      <span>My Project</span>
      <li>
        <a href="https://chrome.google.com/webstore/detail/soundcloud-player/oackhlcggjandamnkggpfhfjbnecefej" target="_blank">SoundCloud Player</a>
        - 7000 users
        <!-- <img src="assets/img/scplayer.png" width="500"> -->
      </li>
    </ul>
  </div>
  <script>
      const scene = new THREE.Scene();
      const width = 300, height = 300;
      // const width = window.innerWidth, height = window.innerHeight;
      const camera = new THREE.PerspectiveCamera( 75, width / height, 0.1, 1000 );

      const renderer = new THREE.WebGLRenderer();
      renderer.setSize( width, height );
      document.getElementById('cube').appendChild( renderer.domElement );

      const geometry = new THREE.BoxGeometry( 1, 1, 1 );
      const material = new THREE.MeshBasicMaterial( { color: 0x00ff00 } );
      const cube = new THREE.Mesh( geometry, material );
      scene.add( cube );

      camera.position.z = 5;

      function animate() {
        requestAnimationFrame( animate );

        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;

        renderer.render( scene, camera );
      };
      
      animate();
  </script>
</body>
</html>
